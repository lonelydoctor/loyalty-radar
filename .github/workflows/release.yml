name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release assets
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write
    steps:
      - name: Check out tagged source
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked release environment
        run: uv sync --frozen --no-editable --extra dev

      - name: Validate tag and distribution contract
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --frozen python .github/scripts/validate_distribution.py --expected-version "${VERSION}"

      - name: Rebuild and validate publication-safe Pages
        run: |
          uv run --frozen python .github/scripts/build_public_site.py
          uv run --frozen python .github/scripts/validate_pages.py docs/site
          git diff --exit-code -- docs/site

      - name: Run fixture-only release tests
        env:
          LOYALTY_RADAR_TEST_MODE: fixture
        run: uv run --frozen pytest -m "not live and not screenshot" --strict-markers

      - name: Build Python distributions
        run: uv build

      - name: Build Plugin ZIP, Skill ZIP, and checksums
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          uv run --frozen python .github/scripts/package_release.py --version "${VERSION}" --dist dist

      - name: Smoke-test clean uv tool, Skill ZIP, and Plugin ZIP surfaces
        shell: bash
        env:
          UV_TOOL_DIR: ${{ runner.temp }}/uv-tools
          UV_TOOL_BIN_DIR: ${{ runner.temp }}/uv-tool-bin
        run: |
          WHEEL="$(find dist -maxdepth 1 -type f -name '*.whl' | head -1)"
          uv tool install --python 3.12 --force "${WHEEL}"
          "${UV_TOOL_BIN_DIR}/loyalty-radar" --help
          "${UV_TOOL_BIN_DIR}/loyalty-radar" doctor --share
          unzip -t dist/loyalty-radar-skill-*.zip
          unzip -t dist/loyalty-radar-plugin-*.zip
          unzip -p dist/loyalty-radar-skill-*.zip loyalty-radar/SKILL.md | grep -q '^---'
          unzip -p dist/loyalty-radar-plugin-*.zip loyalty-radar/.codex-plugin/plugin.json | python -m json.tool >/dev/null

      - name: Set up Node for the best-effort ecosystem check
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Verify remote npx skills discovery
        continue-on-error: true
        run: npx --yes skills add "${GITHUB_REPOSITORY}" --list

      - name: Upload immutable release bundle
        uses: actions/upload-artifact@v7
        with:
          name: loyalty-radar-${{ github.ref_name }}
          path: dist/
          if-no-files-found: error
          retention-days: 30

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" dist/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" dist/* \
              --verify-tag \
              --generate-notes \
              --title "Loyalty Radar ${GITHUB_REF_NAME}"
          fi
