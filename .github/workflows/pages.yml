name: Pages

on:
  push:
    branches:
      - main
    paths:
      - "docs/site/**"
      - "public-briefs/**"
      - "docs/assets/icon-128.png"
      - "docs/assets/social-preview.png"
      - "plugins/loyalty-radar/skills/loyalty-radar/references/source-packs/**"
      - ".github/scripts/build_public_site.py"
      - ".github/scripts/validate_pages.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    name: Build and validate bilingual public reports
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out repository
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.12"

      - name: Build report-first site offline
        run: python .github/scripts/build_public_site.py

      - name: Validate bilingual reports and source catalog
        run: python .github/scripts/validate_pages.py docs/site

      - name: Verify committed Pages output is current
        run: git diff --exit-code -- docs/site

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/site

  deploy:
    name: Deploy Pages
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
