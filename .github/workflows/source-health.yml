name: Weekly source health

on:
  schedule:
    - cron: "17 3 * * 1"
  workflow_dispatch:
    inputs:
      limit:
        description: Maximum number of public sources to probe (1-25)
        required: false
        default: "15"

permissions:
  contents: read
  issues: write

concurrency:
  group: weekly-source-health
  cancel-in-progress: true

jobs:
  health:
    name: Limited public-source probe
    runs-on: macos-latest
    timeout-minutes: 20
    env:
      SOURCE_LIMIT: ${{ github.event.inputs.limit || '15' }}
      GH_TOKEN: ${{ github.token }}
      GITHUB_TOKEN: ${{ github.token }}
    steps:
      - name: Check out repository without write credentials
        uses: actions/checkout@v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
          cache-dependency-glob: uv.lock

      - name: Install locked runtime
        run: uv sync --frozen --no-editable

      - name: Probe a bounded source sample
        run: >-
          uv run --frozen python .github/scripts/live_source_health.py
          --limit "${SOURCE_LIMIT}"
          --output "${RUNNER_TEMP}/source-health.json"
          --summary "${GITHUB_STEP_SUMMARY}"

      - name: Persist streaks and apply deduplicated P0 escalation
        run: >-
          uv run --frozen python .github/scripts/source_health_escalation.py
          --current "${RUNNER_TEMP}/source-health.json"
          --state-output "${RUNNER_TEMP}/source-health-state.json"
          --actions-output "${RUNNER_TEMP}/source-health-actions.json"
          --dashboard-output "${RUNNER_TEMP}/source-health-dashboard.md"
          --repository "${GITHUB_REPOSITORY}"
          --apply

      - name: Upload health metadata only
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: source-health-${{ github.run_id }}
          path: |
            ${{ runner.temp }}/source-health.json
            ${{ runner.temp }}/source-health-state.json
            ${{ runner.temp }}/source-health-actions.json
            ${{ runner.temp }}/source-health-dashboard.md
          if-no-files-found: error
          retention-days: 90
