version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:15"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(actions)

  - package-ecosystem: pip
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "04:30"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    commit-message:
      prefix: deps(python)
    groups:
      python-runtime:
        dependency-type: production
      python-development:
        dependency-type: development
