name: Bug report
description: Report a reproducible problem in collection, clustering, localization, or rendering.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not include account numbers, card numbers, membership IDs, cookies, API keys, or unredacted report JSON.

  - type: input
    id: version
    attributes:
      label: Loyalty Radar version
      placeholder: v0.1.2 or a commit SHA
    validations:
      required: true

  - type: dropdown
    id: install
    attributes:
      label: Installation method
      options:
        - Codex Skill-only Plugin
        - Agent Skill directory
        - Claude or another Agent Skills client
        - uv tool install
        - Source checkout
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS, architecture, Python version, and Agent/client version.
      placeholder: macOS 15 arm64, Python 3.12, Codex desktop
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command or prompt
      description: Redact paths and personal profile values.
      placeholder: loyalty-radar run --mode daily --locale zh-CN
    validations:
      required: true

  - type: dropdown
    id: locale
    attributes:
      label: Report locale
      multiple: true
      options:
        - en
        - zh-CN
        - Not locale-specific
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
      description: Include the smallest useful, redacted error excerpt.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal reproduction
      description: Use sanitized non-production input or a public fixture whenever possible.
    validations:
      required: true

  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy checklist
      options:
        - label: I removed membership IDs, card/account data, cookies, API keys, and private URLs.
          required: true
        - label: I did not attach a real locally generated report or translation cache.
          required: true
